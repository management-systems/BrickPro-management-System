services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: brickpro
      POSTGRES_USER: brickpro
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://brickpro:${DB_PASSWORD:-localdev}@postgres:5432/brickpro
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - backend

  admin:
    build: ./apps/admin
    ports:
      - "3001:3001"
    depends_on:
      - backend

  landing:
    build: ./apps/landing
    ports:
      - "3002:3002"

volumes:
  pgdata:
