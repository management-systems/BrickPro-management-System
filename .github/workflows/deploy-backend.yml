name: Deploy Backend
on:
  push:
    branches: [main]
    paths: ['backend/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd backend && npm ci && npm run build
      - run: cd backend && npx prisma generate
      - name: Build & Push Docker
        run: |
          cd backend
          docker build -t brickpro-backend .
          # Push to ECR
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
          docker tag brickpro-backend:latest ${{ secrets.ECR_REGISTRY }}/brickpro-backend:latest
          docker push ${{ secrets.ECR_REGISTRY }}/brickpro-backend:latest
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
